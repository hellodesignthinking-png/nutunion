<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="hg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <radialGradient id="hg2" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FF48B0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF48B0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hg3" cx="70%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#0055FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0055FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hg4" cx="50%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#FFD200" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFD200" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#hg1)"/>
  <rect width="1200" height="800" fill="url(#hg2)"/>
  <rect width="1200" height="800" fill="url(#hg3)"/>
  <rect width="1200" height="800" fill="url(#hg4)"/>

  <!-- Isometric building cluster -->
  <g transform="translate(600,400)" opacity="0.6">
    <!-- Building 1 - tall -->
    <g transform="translate(-200,-150)">
      <path d="M0,0 L60,-35 L120,0 L60,35 Z" fill="#FF48B0" opacity="0.25"/>
      <path d="M0,0 L0,-180 L60,-215 L60,-35 Z" fill="#FF48B0" opacity="0.15"/>
      <path d="M60,-35 L60,-215 L120,-180 L120,0 Z" fill="#FF48B0" opacity="0.2"/>
      <!-- Windows -->
      <g fill="#F4F1EA" opacity="0.3">
        <rect x="10" y="-160" width="8" height="12" rx="1" transform="skewY(-30)"/>
        <rect x="25" y="-160" width="8" height="12" rx="1" transform="skewY(-30)"/>
        <rect x="10" y="-130" width="8" height="12" rx="1" transform="skewY(-30)"/>
        <rect x="25" y="-130" width="8" height="12" rx="1" transform="skewY(-30)"/>
        <rect x="10" y="-100" width="8" height="12" rx="1" transform="skewY(-30)"/>
        <rect x="25" y="-100" width="8" height="12" rx="1" transform="skewY(-30)"/>
      </g>
    </g>
    <!-- Building 2 - wide -->
    <g transform="translate(-60,-50)">
      <path d="M0,0 L80,-46 L160,0 L80,46 Z" fill="#0055FF" opacity="0.2"/>
      <path d="M0,0 L0,-100 L80,-146 L80,-46 Z" fill="#0055FF" opacity="0.12"/>
      <path d="M80,-46 L80,-146 L160,-100 L160,0 Z" fill="#0055FF" opacity="0.16"/>
      <g fill="#F4F1EA" opacity="0.25">
        <rect x="90" y="-130" width="10" height="8" rx="1" transform="skewY(30)"/>
        <rect x="110" y="-130" width="10" height="8" rx="1" transform="skewY(30)"/>
        <rect x="130" y="-130" width="10" height="8" rx="1" transform="skewY(30)"/>
        <rect x="90" y="-108" width="10" height="8" rx="1" transform="skewY(30)"/>
        <rect x="110" y="-108" width="10" height="8" rx="1" transform="skewY(30)"/>
        <rect x="130" y="-108" width="10" height="8" rx="1" transform="skewY(30)"/>
      </g>
    </g>
    <!-- Building 3 - medium -->
    <g transform="translate(100,-80)">
      <path d="M0,0 L50,-29 L100,0 L50,29 Z" fill="#FFD200" opacity="0.2"/>
      <path d="M0,0 L0,-130 L50,-159 L50,-29 Z" fill="#FFD200" opacity="0.12"/>
      <path d="M50,-29 L50,-159 L100,-130 L100,0 Z" fill="#FFD200" opacity="0.16"/>
    </g>
  </g>

  <!-- Connecting dotted lines -->
  <g stroke="#F4F1EA" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.15">
    <line x1="200" y1="200" x2="500" y2="350"/>
    <line x1="500" y1="350" x2="900" y2="250"/>
    <line x1="700" y1="500" x2="400" y2="600"/>
    <line x1="300" y1="400" x2="800" y2="450"/>
  </g>

  <!-- Floating particles -->
  <g fill="#FF48B0">
    <circle cx="150" cy="150" r="3" opacity="0.4"><animate attributeName="cy" values="150;140;150" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="200" r="2" opacity="0.3"><animate attributeName="cy" values="200;190;200" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="600" r="2.5" opacity="0.35"><animate attributeName="cy" values="600;588;600" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#0055FF">
    <circle cx="950" cy="500" r="2" opacity="0.3"><animate attributeName="cy" values="500;490;500" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="350" r="3" opacity="0.25"><animate attributeName="cy" values="350;340;350" dur="3s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#FFD200">
    <circle cx="800" cy="650" r="2" opacity="0.3"><animate attributeName="cy" values="650;640;650" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="100" r="2.5" opacity="0.2"><animate attributeName="cy" values="100;90;100" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Large typography watermark -->
  <text x="600" y="750" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="180" fill="none" stroke="#F4F1EA" stroke-width="0.5" opacity="0.04" letter-spacing="-8">NUTUNION</text>
</svg>
