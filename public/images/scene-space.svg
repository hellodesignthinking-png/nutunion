<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="ss1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#ss1)"/>
  <!-- Room interior - isometric -->
  <!-- Floor -->
  <path d="M100,450 L400,280 L700,450 L400,620 Z" fill="#1A1A1A" stroke="#F4F1EA" stroke-width="0.5" opacity="0.3"/>
  <!-- Back wall left -->
  <path d="M100,450 L100,200 L400,30 L400,280 Z" fill="#222" stroke="#F4F1EA" stroke-width="0.3" opacity="0.2"/>
  <!-- Back wall right -->
  <path d="M400,280 L400,30 L700,200 L700,450 Z" fill="#1E1E1E" stroke="#F4F1EA" stroke-width="0.3" opacity="0.2"/>
  <!-- Window on left wall -->
  <path d="M180,350 L180,220 L300,150 L300,280 Z" fill="#0055FF" opacity="0.15" stroke="#F4F1EA" stroke-width="0.5" opacity="0.3"/>
  <line x1="240" y1="185" x2="240" y2="315" stroke="#F4F1EA" stroke-width="0.3" opacity="0.3"/>
  <line x1="180" y1="285" x2="300" y2="215" stroke="#F4F1EA" stroke-width="0.3" opacity="0.3"/>
  <!-- Furniture - desk -->
  <path d="M350,400 L480,330 L560,375 L430,445 Z" fill="#C8882A" opacity="0.3" stroke="#F4F1EA" stroke-width="0.3"/>
  <path d="M350,400 L350,385 L480,315 L480,330 Z" fill="#C8882A" opacity="0.2"/>
  <!-- Chair -->
  <ellipse cx="420" cy="470" rx="25" ry="15" fill="#FF48B0" opacity="0.2" stroke="#F4F1EA" stroke-width="0.3"/>
  <path d="M395,470 L405,420 L435,420 L445,470" fill="none" stroke="#F4F1EA" stroke-width="0.5" opacity="0.3"/>
  <!-- Plant -->
  <g transform="translate(600,350)">
    <rect x="-8" y="0" width="16" height="25" rx="3" fill="#C8882A" opacity="0.3"/>
    <circle cx="0" cy="-10" r="20" fill="#0055FF" opacity="0.12"/>
    <circle cx="-12" cy="-18" r="12" fill="#0055FF" opacity="0.1"/>
    <circle cx="10" cy="-22" r="14" fill="#0055FF" opacity="0.08"/>
  </g>
  <!-- Hanging light -->
  <line x1="350" y1="30" x2="350" y2="150" stroke="#FFD200" stroke-width="0.5" opacity="0.4"/>
  <circle cx="350" cy="160" r="15" fill="#FFD200" opacity="0.15" stroke="#FFD200" stroke-width="0.5" opacity="0.3"/>
  <circle cx="350" cy="160" r="5" fill="#FFD200" opacity="0.5"/>
  <!-- Light glow -->
  <radialGradient id="lg1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFD200" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#FFD200" stop-opacity="0"/>
  </radialGradient>
  <circle cx="350" cy="300" r="200" fill="url(#lg1)"/>
  <!-- People silhouettes -->
  <g opacity="0.4">
    <ellipse cx="300" cy="490" rx="8" ry="4" fill="#F4F1EA" opacity="0.15"/>
    <path d="M292,490 Q296,450 300,440 Q304,450 308,490" fill="#F4F1EA" opacity="0.2"/>
    <circle cx="300" cy="430" r="8" fill="#F4F1EA" opacity="0.2"/>
  </g>
  <g opacity="0.3">
    <ellipse cx="470" cy="460" rx="7" ry="3.5" fill="#F4F1EA" opacity="0.15"/>
    <path d="M463,460 Q467,425 470,415 Q473,425 477,460" fill="#F4F1EA" opacity="0.2"/>
    <circle cx="470" cy="407" r="7" fill="#F4F1EA" opacity="0.2"/>
  </g>
  <!-- Label -->
  <text x="50" y="570" font-family="monospace" font-size="9" fill="#F4F1EA" opacity="0.25" letter-spacing="4">SCENE 001 — SPACE ARCHITECTS SEOUL</text>
</svg>
