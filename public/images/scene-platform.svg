<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0D0D0D"/>
  <!-- Code/terminal aesthetic -->
  <!-- Terminal window -->
  <rect x="80" y="60" width="640" height="400" rx="8" fill="#151515" stroke="#333" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="80" y="60" width="640" height="32" rx="8" fill="#222"/>
  <rect x="80" y="84" width="640" height="8" fill="#222"/>
  <circle cx="102" cy="76" r="5" fill="#FF48B0" opacity="0.8"/>
  <circle cx="120" cy="76" r="5" fill="#FFD200" opacity="0.8"/>
  <circle cx="138" cy="76" r="5" fill="#0055FF" opacity="0.6"/>
  <!-- Code lines -->
  <g font-family="monospace" font-size="11" opacity="0.7">
    <text x="100" y="120" fill="#0055FF">import</text><text x="150" y="120" fill="#F4F1EA"> {'{ Scene }'} </text><text x="260" y="120" fill="#0055FF">from</text><text x="300" y="120" fill="#FFD200"> 'nutunion'</text>
    <text x="100" y="145" fill="#F4F1EA" opacity="0.3">// Connect spaces, cultures, platforms</text>
    <text x="100" y="175" fill="#FF48B0">const</text><text x="145" y="175" fill="#F4F1EA"> scene = </text><text x="230" y="175" fill="#0055FF">Scene</text><text x="275" y="175" fill="#F4F1EA">.create({'{'}</text>
    <text x="120" y="200" fill="#F4F1EA">  name: </text><text x="185" y="200" fill="#FFD200">'Seoul Scene 001'</text><text x="340" y="200" fill="#F4F1EA">,</text>
    <text x="120" y="225" fill="#F4F1EA">  type: </text><text x="185" y="225" fill="#FFD200">'space'</text><text x="245" y="225" fill="#F4F1EA">,</text>
    <text x="120" y="250" fill="#F4F1EA">  crew: </text><text x="185" y="250" fill="#0055FF">[</text><text x="195" y="250" fill="#FFD200">'architects'</text><text x="295" y="250" fill="#F4F1EA">, </text><text x="305" y="250" fill="#FFD200">'curators'</text><text x="385" y="250" fill="#0055FF">]</text><text x="395" y="250" fill="#F4F1EA">,</text>
    <text x="120" y="275" fill="#F4F1EA">  vibe: </text><text x="185" y="275" fill="#FFD200">'experimental'</text>
    <text x="100" y="300" fill="#F4F1EA">{'}'})</text>
    <text x="100" y="335" fill="#FF48B0">await</text><text x="150" y="335" fill="#F4F1EA"> scene.</text><text x="215" y="335" fill="#0055FF">launch</text><text x="265" y="335" fill="#F4F1EA">()</text>
    <text x="100" y="365" fill="#F4F1EA" opacity="0.3">// → Scene deployed to 38 cities</text>
    <text x="100" y="395" fill="#0055FF" opacity="0.5">█</text>
  </g>
  <!-- Floating UI cards around terminal -->
  <g opacity="0.5">
    <!-- Card 1 -->
    <rect x="60" y="490" width="160" height="80" rx="4" fill="#1A1A1A" stroke="#333" stroke-width="0.5"/>
    <rect x="72" y="502" width="40" height="6" rx="3" fill="#FF48B0" opacity="0.5"/>
    <rect x="72" y="516" width="120" height="4" rx="2" fill="#F4F1EA" opacity="0.15"/>
    <rect x="72" y="526" width="90" height="4" rx="2" fill="#F4F1EA" opacity="0.1"/>
    <text x="72" y="555" font-family="monospace" font-size="8" fill="#F4F1EA" opacity="0.3">152 crews active</text>
    <!-- Card 2 -->
    <rect x="260" y="490" width="160" height="80" rx="4" fill="#1A1A1A" stroke="#333" stroke-width="0.5"/>
    <rect x="272" y="502" width="40" height="6" rx="3" fill="#0055FF" opacity="0.5"/>
    <rect x="272" y="516" width="110" height="4" rx="2" fill="#F4F1EA" opacity="0.15"/>
    <rect x="272" y="526" width="80" height="4" rx="2" fill="#F4F1EA" opacity="0.1"/>
    <text x="272" y="555" font-family="monospace" font-size="8" fill="#F4F1EA" opacity="0.3">890 events/mo</text>
    <!-- Card 3 -->
    <rect x="460" y="490" width="160" height="80" rx="4" fill="#1A1A1A" stroke="#333" stroke-width="0.5"/>
    <rect x="472" y="502" width="40" height="6" rx="3" fill="#FFD200" opacity="0.5"/>
    <rect x="472" y="516" width="100" height="4" rx="2" fill="#F4F1EA" opacity="0.15"/>
    <rect x="472" y="526" width="70" height="4" rx="2" fill="#F4F1EA" opacity="0.1"/>
    <text x="472" y="555" font-family="monospace" font-size="8" fill="#F4F1EA" opacity="0.3">38 cities</text>
  </g>
  <text x="50" y="580" font-family="monospace" font-size="9" fill="#F4F1EA" opacity="0.2" letter-spacing="4">SCENE 003 — OPEN SOURCE CITY</text>
</svg>
