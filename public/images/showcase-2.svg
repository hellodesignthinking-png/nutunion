<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#FF48B0"/>
  <!-- Network nodes -->
  <g stroke="#F4F1EA" stroke-width="1" fill="none" opacity="0.3">
    <circle cx="200" cy="150" r="40"/><circle cx="400" cy="100" r="30"/><circle cx="600" cy="180" r="50"/>
    <circle cx="150" cy="350" r="35"/><circle cx="350" cy="300" r="45"/><circle cx="550" cy="370" r="30"/>
    <circle cx="700" cy="320" r="40"/>
    <line x1="200" y1="150" x2="400" y2="100"/><line x1="400" y1="100" x2="600" y2="180"/>
    <line x1="200" y1="150" x2="150" y2="350"/><line x1="200" y1="150" x2="350" y2="300"/>
    <line x1="400" y1="100" x2="350" y2="300"/><line x1="600" y1="180" x2="550" y2="370"/>
    <line x1="600" y1="180" x2="700" y2="320"/><line x1="350" y1="300" x2="550" y2="370"/>
    <line x1="550" y1="370" x2="700" y2="320"/><line x1="150" y1="350" x2="350" y2="300"/>
  </g>
  <!-- Node centers -->
  <g fill="#F4F1EA">
    <circle cx="200" cy="150" r="5"/><circle cx="400" cy="100" r="5"/><circle cx="600" cy="180" r="5"/>
    <circle cx="150" cy="350" r="5"/><circle cx="350" cy="300" r="5"/><circle cx="550" cy="370" r="5"/>
    <circle cx="700" cy="320" r="5"/>
  </g>
  <!-- Labels -->
  <text x="200" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#F4F1EA" opacity="0.7" dy="25">SCENE 01</text>
  <text x="400" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#F4F1EA" opacity="0.7" dy="25">SCENE 02</text>
  <text x="600" y="185" text-anchor="middle" font-family="monospace" font-size="9" fill="#F4F1EA" opacity="0.7" dy="25">SCENE 03</text>
  <text x="350" y="305" text-anchor="middle" font-family="monospace" font-size="9" fill="#F4F1EA" opacity="0.7" dy="25">SCENE 04</text>
</svg>
