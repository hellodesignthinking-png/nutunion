<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#C8882A"/>
  <!-- Gallery wall -->
  <rect x="0" y="0" width="800" height="420" fill="#1A1A1A" opacity="0.85"/>
  <!-- Floor -->
  <rect x="0" y="420" width="800" height="180" fill="#C8882A" opacity="0.3"/>
  <!-- Artwork frames -->
  <g>
    <!-- Frame 1 - large -->
    <rect x="60" y="80" width="200" height="280" fill="#1E1E1E" stroke="#F4F1EA" stroke-width="1" opacity="0.5"/>
    <rect x="72" y="92" width="176" height="256" fill="#FF48B0" opacity="0.12"/>
    <circle cx="160" cy="200" r="60" fill="none" stroke="#F4F1EA" stroke-width="0.5" opacity="0.3"/>
    <circle cx="160" cy="200" r="30" fill="#FF48B0" opacity="0.15"/>
    <path d="M100,280 Q130,240 160,270 Q190,240 220,280" stroke="#F4F1EA" stroke-width="0.5" fill="none" opacity="0.3"/>
    <!-- Frame 2 - medium -->
    <rect x="310" y="120" width="180" height="200" fill="#1E1E1E" stroke="#F4F1EA" stroke-width="1" opacity="0.5"/>
    <rect x="322" y="132" width="156" height="176" fill="#0055FF" opacity="0.1"/>
    <rect x="345" y="160" width="110" height="70" fill="#0055FF" opacity="0.12"/>
    <rect x="355" y="250" width="40" height="40" fill="#FFD200" opacity="0.15"/>
    <rect x="405" y="250" width="40" height="40" fill="#FF48B0" opacity="0.12"/>
    <!-- Frame 3 - tall -->
    <rect x="540" y="60" width="200" height="310" fill="#1E1E1E" stroke="#F4F1EA" stroke-width="1" opacity="0.5"/>
    <rect x="552" y="72" width="176" height="286" fill="#FFD200" opacity="0.08"/>
    <path d="M580,150 L640,100 L700,150 L680,250 L600,250 Z" fill="none" stroke="#F4F1EA" stroke-width="0.5" opacity="0.3"/>
    <line x1="640" y1="100" x2="640" y2="330" stroke="#F4F1EA" stroke-width="0.3" opacity="0.2"/>
  </g>
  <!-- Gallery visitors -->
  <g opacity="0.5">
    <circle cx="200" cy="440" r="6" fill="#F4F1EA" opacity="0.5"/>
    <path d="M194,448 L194,480 M200,448 L200,480 M206,448 L206,480" stroke="#F4F1EA" stroke-width="1.5" opacity="0.3"/>
  </g>
  <g opacity="0.4">
    <circle cx="500" cy="445" r="5" fill="#F4F1EA" opacity="0.5"/>
    <path d="M495,452 L495,478 M500,452 L500,478 M505,452 L505,478" stroke="#F4F1EA" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Spot lights -->
  <g opacity="0.15">
    <polygon points="150,0 170,0 200,80 120,80" fill="#FFD200"/>
    <polygon points="390,0 410,0 440,120 360,120" fill="#FFD200"/>
    <polygon points="630,0 650,0 680,60 600,60" fill="#FFD200"/>
  </g>
  <text x="50" y="570" font-family="monospace" font-size="9" fill="#F4F1EA" opacity="0.35" letter-spacing="4">SCENE 002 — FIELD CULTURE LAB</text>
</svg>
