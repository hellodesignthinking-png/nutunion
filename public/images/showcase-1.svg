<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg1)"/>
  <!-- Building silhouettes -->
  <rect x="50" y="180" width="80" height="320" fill="#FF48B0" opacity="0.15"/>
  <rect x="140" y="120" width="60" height="380" fill="#FF48B0" opacity="0.1"/>
  <rect x="220" y="200" width="100" height="300" fill="#0055FF" opacity="0.12"/>
  <rect x="340" y="80" width="70" height="420" fill="#0055FF" opacity="0.08"/>
  <rect x="430" y="160" width="90" height="340" fill="#FFD200" opacity="0.1"/>
  <rect x="540" y="100" width="80" height="400" fill="#FFD200" opacity="0.08"/>
  <rect x="640" y="220" width="110" height="280" fill="#FF48B0" opacity="0.12"/>
  <!-- Windows grid -->
  <g fill="#F4F1EA" opacity="0.15">
    <rect x="65" y="200" width="12" height="12" rx="1"/><rect x="85" y="200" width="12" height="12" rx="1"/><rect x="105" y="200" width="12" height="12" rx="1"/>
    <rect x="65" y="230" width="12" height="12" rx="1"/><rect x="85" y="230" width="12" height="12" rx="1"/><rect x="105" y="230" width="12" height="12" rx="1"/>
    <rect x="65" y="260" width="12" height="12" rx="1"/><rect x="85" y="260" width="12" height="12" rx="1"/><rect x="105" y="260" width="12" height="12" rx="1"/>
    <rect x="155" y="140" width="10" height="10" rx="1"/><rect x="175" y="140" width="10" height="10" rx="1"/>
    <rect x="155" y="160" width="10" height="10" rx="1"/><rect x="175" y="160" width="10" height="10" rx="1"/>
    <rect x="155" y="180" width="10" height="10" rx="1"/><rect x="175" y="180" width="10" height="10" rx="1"/>
  </g>
  <!-- Connecting lines -->
  <line x1="90" y1="350" x2="370" y2="250" stroke="#FF48B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="370" y1="250" x2="580" y2="300" stroke="#0055FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="580" y1="300" x2="700" y2="350" stroke="#FFD200" stroke-width="0.5" opacity="0.3"/>
  <!-- Text overlay -->
  <text x="400" y="460" text-anchor="middle" font-family="monospace" font-size="10" fill="#F4F1EA" opacity="0.3" letter-spacing="8">SPACE · CULTURE · PLATFORM · VIBE</text>
